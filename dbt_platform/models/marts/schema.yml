version: 2

models:
  - name: dim_customers
    description: "Customer dimension table"
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: email
        data_tests:
          - unique
          - not_null

  - name: dim_products
    description: "Product dimension table"
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: fct_orders
    description: "Orders fact table"
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: product_id
        data_tests:
          - not_null
      - name: amount
        data_tests:
          - not_null
          